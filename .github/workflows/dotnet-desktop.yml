name: Build Pluck

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build Pluck.slnx -c Release

      - name: Publish portable
        run: dotnet publish Pluck.UI/Pluck.UI.csproj -c Release -p:PublishProfile=Portable
